name: Build & Push Face-ID Docker Image
on:
  push:
    branches: [main]
    paths:
      - 'face_embed_handler.py'
      - 'Dockerfile.faceid'
  workflow_dispatch:
env:
  DOCKERHUB_IMAGE: tgndtheme/tgnd-flux-lora
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.faceid
          push: true
          tags: ${{ env.DOCKERHUB_IMAGE }}:faceid-latest
          provenance: false

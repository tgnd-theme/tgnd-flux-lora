name: Build & Push Training Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'handler_training.py'
      - 'Dockerfile.training'
  workflow_dispatch:

env:
  DOCKERHUB_IMAGE: tgndtheme/tgnd-flux-lora

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          docker system prune -af
          df -h /

      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=sha,format=long,prefix=training-
            type=raw,value=training-latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.training
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.description=TGND LoRA Training Handler for RunPod (ai-toolkit + Claude Vision captions)
          provenance: false
